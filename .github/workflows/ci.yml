name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore AleoDotNet.sln

      - name: Build
        run: dotnet build AleoDotNet.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test AleoDotNet.sln --no-build --configuration Release
